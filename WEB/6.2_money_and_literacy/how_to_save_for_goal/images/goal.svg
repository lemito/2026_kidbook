  <circle cx="300" cy="200" r="150" fill="#FF6B6B" opacity="0.2"/>
  <circle cx="300" cy="200" r="110" fill="#FF6B6B" opacity="0.3"/>
  <circle cx="300" cy="200" r="70" fill="#FF6B6B" opacity="0.5"/>
  <circle cx="300" cy="200" r="35" fill="#FF6B6B"/>
