<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#F4F6F7"/>
  <!-- SMART acronym blocks -->
  <!-- S -->
  <rect x="40" y="80" width="90" height="220" rx="12" fill="#E74C3C"/>
  <text x="85" y="145" text-anchor="middle" font-family="Arial" font-size="42" font-weight="bold" fill="white">S</text>
  <text x="85" y="175" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Specific</text>
  <text x="85" y="193" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Конкретная</text>
  <text x="85" y="225" text-anchor="middle" font-family="Arial" font-size="10" fill="#FADBD8">«Хочу велосипед</text>
  <text x="85" y="240" text-anchor="middle" font-family="Arial" font-size="10" fill="#FADBD8">за 5000₽»</text>
  <!-- M -->
  <rect x="150" y="80" width="90" height="220" rx="12" fill="#E67E22"/>
  <text x="195" y="145" text-anchor="middle" font-family="Arial" font-size="42" font-weight="bold" fill="white">M</text>
  <text x="195" y="175" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Measurable</text>
  <text x="195" y="193" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Измеримая</text>
  <text x="195" y="225" text-anchor="middle" font-family="Arial" font-size="10" fill="#FDEBD0">«Откладываю</text>
  <text x="195" y="240" text-anchor="middle" font-family="Arial" font-size="10" fill="#FDEBD0">по 500₽»</text>
  <!-- A -->
  <rect x="260" y="80" width="90" height="220" rx="12" fill="#27AE60"/>
  <text x="305" y="145" text-anchor="middle" font-family="Arial" font-size="42" font-weight="bold" fill="white">A</text>
  <text x="305" y="175" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Achievable</text>
  <text x="305" y="193" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Достижимая</text>
  <text x="305" y="225" text-anchor="middle" font-family="Arial" font-size="10" fill="#D5F5E3">«Реально за</text>
  <text x="305" y="240" text-anchor="middle" font-family="Arial" font-size="10" fill="#D5F5E3">10 месяцев»</text>
  <!-- R -->
  <rect x="370" y="80" width="90" height="220" rx="12" fill="#2980B9"/>
  <text x="415" y="145" text-anchor="middle" font-family="Arial" font-size="42" font-weight="bold" fill="white">R</text>
  <text x="415" y="175" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Relevant</text>
  <text x="415" y="193" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Значимая</text>
  <text x="415" y="225" text-anchor="middle" font-family="Arial" font-size="10" fill="#D6EAF8">«Важно</text>
  <text x="415" y="240" text-anchor="middle" font-family="Arial" font-size="10" fill="#D6EAF8">именно мне»</text>
  <!-- T -->
  <rect x="480" y="80" width="90" height="220" rx="12" fill="#8E44AD"/>
  <text x="525" y="145" text-anchor="middle" font-family="Arial" font-size="42" font-weight="bold" fill="white">T</text>
  <text x="525" y="175" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Time-bound</text>
  <text x="525" y="193" text-anchor="middle" font-family="Arial" font-size="11" fill="white">С дедлайном</text>
  <text x="525" y="225" text-anchor="middle" font-family="Arial" font-size="10" fill="#E8DAEF">«К 1 июня</text>
  <text x="525" y="240" text-anchor="middle" font-family="Arial" font-size="10" fill="#E8DAEF">2026 года»</text>
  <!-- Text -->
  <text x="300" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2C3E50">SMART — формула правильной цели</text>
</svg>
