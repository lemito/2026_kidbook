<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#EAF4FB"/>
  <!-- Bank building -->
  <rect x="150" y="160" width="300" height="180" fill="#2980B9" rx="5"/>
  <rect x="130" y="155" width="340" height="25" fill="#1A6FA3" rx="3"/>
  <!-- Roof / columns top -->
  <polygon points="300,80 130,155 470,155" fill="#1558A0"/>
  <!-- Columns -->
  <rect x="185" y="180" width="20" height="140" fill="white" opacity="0.4"/>
  <rect x="240" y="180" width="20" height="140" fill="white" opacity="0.4"/>
  <rect x="340" y="180" width="20" height="140" fill="white" opacity="0.4"/>
  <rect x="395" y="180" width="20" height="140" fill="white" opacity="0.4"/>
  <!-- Door -->
  <rect x="265" y="270" width="70" height="70" rx="5" fill="#F39C12"/>
  <circle cx="325" cy="305" r="5" fill="#E67E22"/>
  <!-- Bank name -->
  <text x="300" y="235" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">БАНК ДЛЯ ДЕТЕЙ</text>
  <!-- Stars on top -->
  <text x="280" y="75" font-size="22" fill="#F1C40F">★</text>
  <text x="300" y="65" font-size="22" fill="#F1C40F">★</text>
  <text x="320" y="75" font-size="22" fill="#F1C40F">★</text>
  <!-- Steps -->
  <rect x="220" y="335" width="160" height="10" rx="2" fill="#1558A0"/>
  <rect x="200" y="343" width="200" height="10" rx="2" fill="#1558A0"/>
  <!-- Text -->
  <text x="300" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1A5276">Банковский счёт — копилка с %</text>
</svg>
