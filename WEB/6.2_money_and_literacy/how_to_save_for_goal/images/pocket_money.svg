<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#FDFEFE"/>
  <!-- Hand giving money to child's hand -->
  <!-- Adult hand (left) -->
  <path d="M80,220 Q70,200 90,180 L130,150 Q145,140 155,155 L165,170 Q175,185 160,195 L140,205 L200,230 Q215,240 205,255 Q195,268 180,260 L120,240 Q100,260 90,250 Z" fill="#F0C8A0" stroke="#D4A574" stroke-width="2"/>
  <!-- Banknote in adult hand -->
  <rect x="100" y="160" width="100" height="55" rx="6" fill="#27AE60" stroke="#1E8449" stroke-width="1.5"/>
  <text x="150" y="193" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">500 ₽</text>
  <!-- Arrow -->
  <path d="M220,200 Q270,180 310,195" stroke="#F39C12" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <polygon points="310,195 295,183 295,207" fill="#F39C12"/>
  <!-- Child hand (right) -->
  <path d="M520,220 Q530,200 510,180 L470,150 Q455,140 445,155 L435,170 Q425,185 440,195 L460,205 L400,230 Q385,240 395,255 Q405,268 420,260 L480,240 Q500,260 510,250 Z" fill="#F0C8A0" stroke="#D4A574" stroke-width="2"/>
  <!-- Wallet in child hand -->
  <rect x="400" y="155" width="80" height="60" rx="8" fill="#8E44AD"/>
  <rect x="455" y="165" width="20" height="20" rx="10" fill="#9B59B6"/>
  <text x="430" y="192" text-anchor="middle" font-family="Arial" font-size="24" fill="#F1C40F">👛</text>
  <!-- Labels -->
  <text x="150" y="290" text-anchor="middle" font-family="Arial" font-size="15" fill="#2C3E50">Родители</text>
  <text x="450" y="290" text-anchor="middle" font-family="Arial" font-size="15" fill="#2C3E50">Ты</text>
  <!-- Divide into sections -->
  <rect x="350" y="310" width="60" height="35" rx="6" fill="#E74C3C"/>
  <text x="380" y="333" text-anchor="middle" font-family="Arial" font-size="11" fill="white">трачу</text>
  <rect x="420" y="310" width="60" height="35" rx="6" fill="#27AE60"/>
  <text x="450" y="333" text-anchor="middle" font-family="Arial" font-size="11" fill="white">коплю</text>
  <rect x="490" y="310" width="60" height="35" rx="6" fill="#3498DB"/>
  <text x="520" y="333" text-anchor="middle" font-family="Arial" font-size="11" fill="white">дарю</text>
  <!-- Text -->
  <text x="300" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#6C3483">Карманные деньги — первый опыт!</text>
</svg>
