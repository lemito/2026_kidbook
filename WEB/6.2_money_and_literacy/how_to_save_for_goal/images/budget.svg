<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#EAF4FB"/>
  <!-- Notebook -->
  <rect x="120" y="60" width="360" height="280" rx="12" fill="white" stroke="#2980B9" stroke-width="3"/>
  <rect x="120" y="60" width="40" height="280" rx="8" fill="#2980B9"/>
  <!-- Lines on notebook -->
  <line x1="185" y1="110" x2="455" y2="110" stroke="#BDC3C7" stroke-width="1.5"/>
  <line x1="185" y1="140" x2="455" y2="140" stroke="#BDC3C7" stroke-width="1.5"/>
  <line x1="185" y1="170" x2="455" y2="170" stroke="#BDC3C7" stroke-width="1.5"/>
  <line x1="185" y1="200" x2="455" y2="200" stroke="#BDC3C7" stroke-width="1.5"/>
  <line x1="185" y1="230" x2="455" y2="230" stroke="#BDC3C7" stroke-width="1.5"/>
  <line x1="185" y1="260" x2="455" y2="260" stroke="#BDC3C7" stroke-width="1.5"/>
  <!-- Items -->
  <text x="195" y="105" font-family="Arial" font-size="15" fill="#27AE60">+ Карманные деньги: 500 ₽</text>
  <text x="195" y="135" font-family="Arial" font-size="15" fill="#27AE60">+ Подарок от бабушки: 300 ₽</text>
  <text x="195" y="165" font-family="Arial" font-size="15" fill="#E74C3C">− Кино: 200 ₽</text>
  <text x="195" y="195" font-family="Arial" font-size="15" fill="#E74C3C">− Мороженое: 80 ₽</text>
  <text x="195" y="225" font-family="Arial" font-size="15" fill="#8E44AD">→ Отложено: 200 ₽</text>
  <text x="195" y="270" font-family="Arial" font-size="16" font-weight="bold" fill="#2C3E50">Итого накоплено: 320 ₽</text>
  <!-- Title -->
  <text x="300" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2C3E50">Мой личный бюджет</text>
</svg>
