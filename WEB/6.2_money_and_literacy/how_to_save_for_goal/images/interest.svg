<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#FEF9E7"/>
  <!-- Snowball rolling downhill (compound interest metaphor) -->
  <path d="M50,100 Q300,80 550,300" stroke="#95A5A6" stroke-width="3" stroke-dasharray="10,5" fill="none"/>
  <!-- Small snowball -->
  <circle cx="100" cy="105" r="25" fill="#3498DB" opacity="0.8"/>
  <text x="100" y="111" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">1000₽</text>
  <!-- Medium snowball -->
  <circle cx="260" cy="140" r="45" fill="#2980B9" opacity="0.85"/>
  <text x="260" y="147" text-anchor="middle" font-family="Arial" font-size="12" fill="white" font-weight="bold">1210₽</text>
  <!-- Large snowball -->
  <circle cx="470" cy="255" r="75" fill="#1A6FA3" opacity="0.9"/>
  <text x="470" y="262" text-anchor="middle" font-family="Arial" font-size="14" fill="white" font-weight="bold">1610₽</text>
  <!-- Percentage labels -->
  <text x="175" y="108" font-family="Arial" font-size="14" fill="#E74C3C" font-weight="bold">+10%</text>
  <text x="355" y="170" font-family="Arial" font-size="14" fill="#E74C3C" font-weight="bold">+10%</text>
  <!-- Years -->
  <text x="100" y="145" text-anchor="middle" font-family="Arial" font-size="12" fill="#2C3E50">Год 0</text>
  <text x="260" y="200" text-anchor="middle" font-family="Arial" font-size="12" fill="#2C3E50">Год 1</text>
  <text x="470" y="345" text-anchor="middle" font-family="Arial" font-size="12" fill="#2C3E50">Год 5</text>
  <!-- Text -->
  <text x="300" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#7D6608">Проценты — деньги делают деньги!</text>
</svg>
