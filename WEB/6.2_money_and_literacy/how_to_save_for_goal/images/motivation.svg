<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#FEF0E6"/>
  <!-- Progress bar (thermometer style) -->
  <rect x="80" y="60" width="80" height="280" rx="40" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="3"/>
  <rect x="88" y="130" width="64" height="202" rx="32" fill="#E74C3C"/>
  <circle cx="120" cy="310" r="32" fill="#E74C3C" stroke="#C0392B" stroke-width="3"/>
  <!-- Percent marks -->
  <line x1="165" y1="68" x2="180" y2="68" stroke="#7F8C8D" stroke-width="2"/>
  <text x="185" y="73" font-family="Arial" font-size="12" fill="#7F8C8D">100% — 5000₽</text>
  <line x1="165" y1="128" x2="180" y2="128" stroke="#7F8C8D" stroke-width="2"/>
  <text x="185" y="133" font-family="Arial" font-size="12" fill="#7F8C8D">75% — 3750₽</text>
  <line x1="165" y1="198" x2="180" y2="198" stroke="#27AE60" stroke-width="2.5"/>
  <text x="185" y="203" font-family="Arial" font-size="13" fill="#27AE60" font-weight="bold">★ Сейчас: 50%</text>
  <line x1="165" y1="268" x2="180" y2="268" stroke="#7F8C8D" stroke-width="2"/>
  <text x="185" y="273" font-family="Arial" font-size="12" fill="#7F8C8D">25% — 1250₽</text>
  <!-- Motivation tips -->
  <rect x="300" y="80" width="270" height="230" rx="12" fill="white" stroke="#F39C12" stroke-width="2"/>
  <text x="435" y="110" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#E67E22">Советы для мотивации:</text>
  <text x="320" y="140" font-family="Arial" font-size="13" fill="#2C3E50">🎯 Повесь фото мечты</text>
  <text x="320" y="165" font-family="Arial" font-size="13" fill="#2C3E50">📊 Закрашивай прогресс-бар</text>
  <text x="320" y="190" font-family="Arial" font-size="13" fill="#2C3E50">🎉 Отмечай маленькие победы</text>
  <text x="320" y="215" font-family="Arial" font-size="13" fill="#2C3E50">👯 Копи вместе с другом</text>
  <text x="320" y="240" font-family="Arial" font-size="13" fill="#2C3E50">📅 Веди дневник сбережений</text>
  <text x="320" y="265" font-family="Arial" font-size="13" fill="#2C3E50">🏆 Представляй результат!</text>
  <!-- Text -->
  <text x="300" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#A04000">Мотивация — топливо для цели!</text>
</svg>
