<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#FDEDEC"/>
  <!-- Arrow down (expenses) -->
  <polygon points="300,350 340,290 310,290 310,180 290,180 290,290 260,290" fill="#E74C3C"/>
  <!-- Expense categories -->
  <rect x="55" y="60" width="120" height="90" rx="10" fill="#E74C3C" opacity="0.8"/>
  <text x="115" y="95" text-anchor="middle" font-family="Arial" font-size="13" fill="white" font-weight="bold">Обязательные</text>
  <text x="115" y="113" text-anchor="middle" font-family="Arial" font-size="12" fill="white">школа, еда</text>
  <text x="115" y="140" text-anchor="middle" font-family="Arial" font-size="22">🏫</text>
  <rect x="240" y="60" width="120" height="90" rx="10" fill="#E67E22" opacity="0.8"/>
  <text x="300" y="95" text-anchor="middle" font-family="Arial" font-size="13" fill="white" font-weight="bold">Желательные</text>
  <text x="300" y="113" text-anchor="middle" font-family="Arial" font-size="12" fill="white">игры, книги</text>
  <text x="300" y="140" text-anchor="middle" font-family="Arial" font-size="22">🎮</text>
  <rect x="425" y="60" width="120" height="90" rx="10" fill="#C0392B" opacity="0.8"/>
  <text x="485" y="95" text-anchor="middle" font-family="Arial" font-size="13" fill="white" font-weight="bold">Случайные</text>
  <text x="485" y="113" text-anchor="middle" font-family="Arial" font-size="12" fill="white">мороженое</text>
  <text x="485" y="140" text-anchor="middle" font-family="Arial" font-size="22">🍦</text>
  <!-- Lines to arrow -->
  <line x1="115" y1="150" x2="275" y2="220" stroke="#E74C3C" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="300" y1="150" x2="300" y2="180" stroke="#E74C3C" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="485" y1="150" x2="325" y2="220" stroke="#E74C3C" stroke-width="2" stroke-dasharray="5,5"/>
  <!-- Text -->
  <text x="300" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#922B21">На что уходят деньги — расходы</text>
</svg>
