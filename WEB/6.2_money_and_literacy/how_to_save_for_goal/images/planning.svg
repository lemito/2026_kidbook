<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#F0F3FA"/>
  <!-- Road / path to goal -->
  <path d="M80,350 Q200,300 300,200 Q400,100 520,60" stroke="#BDC3C7" stroke-width="40" fill="none" stroke-linecap="round"/>
  <path d="M80,350 Q200,300 300,200 Q400,100 520,60" stroke="#ECF0F1" stroke-width="34" fill="none" stroke-linecap="round" stroke-dasharray="20,15"/>
  <!-- Steps on the path -->
  <circle cx="120" cy="335" r="28" fill="#E74C3C" stroke="white" stroke-width="3"/>
  <text x="120" y="341" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="white">1</text>
  <text x="120" y="375" text-anchor="middle" font-family="Arial" font-size="11" fill="#2C3E50">Ставим</text>
  <text x="120" y="388" text-anchor="middle" font-family="Arial" font-size="11" fill="#2C3E50">цель</text>
  <circle cx="230" cy="290" r="28" fill="#E67E22" stroke="white" stroke-width="3"/>
  <text x="230" y="296" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="white">2</text>
  <text x="230" y="330" text-anchor="middle" font-family="Arial" font-size="11" fill="#2C3E50">Считаем</text>
  <text x="230" y="343" text-anchor="middle" font-family="Arial" font-size="11" fill="#2C3E50">сумму</text>
  <circle cx="310" cy="205" r="28" fill="#F1C40F" stroke="white" stroke-width="3"/>
  <text x="310" y="211" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#2C3E50">3</text>
  <text x="310" y="245" text-anchor="middle" font-family="Arial" font-size="11" fill="#2C3E50">Делим</text>
  <text x="310" y="258" text-anchor="middle" font-family="Arial" font-size="11" fill="#2C3E50">по месяцам</text>
  <circle cx="400" cy="125" r="28" fill="#27AE60" stroke="white" stroke-width="3"/>
  <text x="400" y="131" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="white">4</text>
  <text x="400" y="165" text-anchor="middle" font-family="Arial" font-size="11" fill="#2C3E50">Откладываем</text>
  <text x="400" y="178" text-anchor="middle" font-family="Arial" font-size="11" fill="#2C3E50">регулярно</text>
  <!-- Goal flag -->
  <line x1="510" y1="65" x2="510" y2="25" stroke="#2C3E50" stroke-width="3"/>
  <polygon points="510,25 550,40 510,55" fill="#E74C3C"/>
  <text x="540" y="20" font-size="22" fill="#F1C40F">★</text>
  <!-- Text -->
  <text x="300" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#1A5276">Финансовый план — дорога к мечте</text>
</svg>
