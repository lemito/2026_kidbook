<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#E8F8E8"/>
  <!-- Coins -->
  <circle cx="180" cy="230" r="55" fill="#F1C40F" stroke="#E67E22" stroke-width="3"/>
  <text x="180" y="240" text-anchor="middle" font-family="Arial" font-size="36" font-weight="bold" fill="#E67E22">₽</text>
  <circle cx="300" cy="210" r="65" fill="#F1C40F" stroke="#E67E22" stroke-width="3"/>
  <text x="300" y="222" text-anchor="middle" font-family="Arial" font-size="42" font-weight="bold" fill="#E67E22">₽</text>
  <circle cx="420" cy="230" r="55" fill="#F1C40F" stroke="#E67E22" stroke-width="3"/>
  <text x="420" y="240" text-anchor="middle" font-family="Arial" font-size="36" font-weight="bold" fill="#E67E22">₽</text>
  <!-- Banknote -->
  <rect x="160" y="110" width="280" height="80" rx="10" fill="#27AE60" stroke="#1E8449" stroke-width="2"/>
  <text x="300" y="158" text-anchor="middle" font-family="Arial" font-size="28" font-weight="bold" fill="white">1 000 ₽</text>
  <!-- Text -->
  <text x="300" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2C3E50">Деньги — универсальный обмен</text>
</svg>
