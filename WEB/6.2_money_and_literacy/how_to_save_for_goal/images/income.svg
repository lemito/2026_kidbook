<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#E8F8F5"/>
  <!-- Arrow up (income) -->
  <polygon points="300,50 340,110 310,110 310,220 290,220 290,110 260,110" fill="#27AE60"/>
  <!-- Sources of income for kids -->
  <!-- Pocket money -->
  <rect x="60" y="240" width="130" height="80" rx="10" fill="#27AE60" opacity="0.8"/>
  <text x="125" y="275" text-anchor="middle" font-family="Arial" font-size="13" fill="white" font-weight="bold">Карманные</text>
  <text x="125" y="295" text-anchor="middle" font-family="Arial" font-size="13" fill="white" font-weight="bold">деньги</text>
  <text x="125" y="313" text-anchor="middle" font-family="Arial" font-size="20">💰</text>
  <!-- Gift -->
  <rect x="235" y="240" width="130" height="80" rx="10" fill="#2ECC71" opacity="0.8"/>
  <text x="300" y="275" text-anchor="middle" font-family="Arial" font-size="13" fill="white" font-weight="bold">Подарки</text>
  <text x="300" y="293" text-anchor="middle" font-family="Arial" font-size="13" fill="white" font-weight="bold">от родных</text>
  <text x="300" y="313" text-anchor="middle" font-family="Arial" font-size="20">🎁</text>
  <!-- Work -->
  <rect x="410" y="240" width="130" height="80" rx="10" fill="#1ABC9C" opacity="0.8"/>
  <text x="475" y="275" text-anchor="middle" font-family="Arial" font-size="13" fill="white" font-weight="bold">Помощь</text>
  <text x="475" y="293" text-anchor="middle" font-family="Arial" font-size="13" fill="white" font-weight="bold">по дому</text>
  <text x="475" y="313" text-anchor="middle" font-family="Arial" font-size="20">🧹</text>
  <!-- Lines from sources to arrow -->
  <line x1="125" y1="240" x2="275" y2="180" stroke="#27AE60" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="300" y1="240" x2="300" y2="220" stroke="#27AE60" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="475" y1="240" x2="325" y2="180" stroke="#27AE60" stroke-width="2" stroke-dasharray="5,5"/>
  <!-- Title -->
  <text x="300" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1A5276">Откуда берутся деньги — доходы</text>
</svg>
